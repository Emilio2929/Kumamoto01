<div class="dashboard-layout">
  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebarOnMobile()"></div>

  <aside class="sidebar" [class.open]="isSidebarOpen" [class.collapsed]="isSidebarCollapsed">
    <div class="logo">
      <img src="/assets/img/insignia_colegio.png" alt="Insignia" class="logo-img">
      <div class="brand-info">
        <span class="name">Kumamoto I</span>
        <span class="portal-type">Portal Auxiliar</span>
      </div>
    </div>

    <nav class="nav-menu">
      <ul>
        <li>
          <a routerLink="dashboard" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="aulas" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"></rect>
              <rect x="14" y="3" width="7" height="7" rx="1"></rect>
              <rect x="14" y="14" width="7" height="7" rx="1"></rect>
              <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            </svg>
            <span>Mis Aulas</span>
          </a>
        </li>
        <li>
          <a routerLink="reportes" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Reportes</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <div class="main-container">
    <header class="topbar">
      <div class="left-actions">
        <button class="mobile-menu-btn" (click)="toggleSidebar()" aria-label="Abrir menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="user-profile">
        <div class="avatar">{{ (user?.nombre || 'A').slice(0, 1) }}</div>
        <div class="user-info">
          <span class="name">{{ user?.nombre || 'Auxiliar' }}</span>
          <span class="role">{{ user?.rol || 'Auxiliar' }}</span>
        </div>
      </div>
    </header>

    <main class="content-area custom-scrollbar">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
