<div class="dashboard-layout">
  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebarOnMobile()"></div>

  <aside class="sidebar" [class.open]="isSidebarOpen" [class.collapsed]="isSidebarCollapsed">
    <div class="logo">
      <div class="logo-icon">K</div>
      <span>Portal Auxiliar</span>
    </div>

    <nav class="nav-menu">
      <ul>
        <li>
          <a routerLink="aulas" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M3 10.5V21h18V10.5" />
              <path d="M12 3l10 7.5H2L12 3z" />
            </svg>
            <span>Mis Aulas</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <div class="main-container">
    <header class="topbar">
      <div class="left-actions">
        <button class="mobile-menu-btn" (click)="toggleSidebar()" aria-label="Abrir menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="user-profile">
        <div class="avatar">{{ (user?.nombre || 'A').slice(0, 1) }}</div>
        <div class="user-info">
          <span class="name">{{ user?.nombre || 'Auxiliar' }}</span>
          <span class="role">{{ user?.rol || 'Auxiliar' }}</span>
        </div>
      </div>
    </header>

    <main class="content-area custom-scrollbar">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
