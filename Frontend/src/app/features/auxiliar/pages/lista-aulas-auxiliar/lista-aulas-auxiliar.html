<div class="page-container">
  <div class="header">
    <h1>Mis Aulas Asignadas</h1>
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando aulas...</p>
  </div>

  <div *ngIf="errorMsg" class="error-state">
    <p>{{ errorMsg }}</p>
  </div>

  <div class="aulas-grid" *ngIf="!loading && !errorMsg">
    <div class="aula-card" *ngFor="let aula of aulas; trackBy: trackByAulaId">
      <div class="card-header">
        <div class="aula-info">
          <h3>{{ aula.gradoNombre }} · Sección {{ aula.seccionLetra }}</h3>
          <span class="aula-desc" *ngIf="aula.aulaDescripcion">{{ aula.aulaDescripcion }}</span>
        </div>
        <div class="status-badge" [ngClass]="estadoClass(aula)">
          {{ estadoLabel(aula) }}
        </div>
      </div>

      <div class="courses-section">
        <div class="course-list" *ngIf="aula.cursosHoy.length > 0">
          <div class="course-item" *ngFor="let curso of aula.cursosHoy" 
               [class.active]="curso.esActual" 
               (click)="irAsistencia(aula.aulaId, curso.cargaId)">
            <div class="course-main">
              <span class="course-name">{{ curso.nombre }}</span>
              <span class="course-time">{{ curso.horario }}</span>
            </div>
            <div class="course-action">
              <span class="action-label">{{ curso.esActual ? 'En curso' : 'Ver bloque' }}</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
          </div>
        </div>

        <div class="no-courses" *ngIf="aula.cursosHoy.length === 0">
          Sin clases programadas hoy
        </div>
      </div>
    </div>
  </div>
</div>
