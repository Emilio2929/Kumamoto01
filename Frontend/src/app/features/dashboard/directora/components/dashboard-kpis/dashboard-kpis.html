<div *ngIf="loading" class="state-message loading">
  <div class="spinner"></div>
  <span>Cargando estadísticas desde PostgreSQL...</span>
</div>

<div *ngIf="errorMsg" class="state-message error">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
  <span>{{ errorMsg }}</span>
</div>

<div class="kpi-grid" *ngIf="!loading && !errorMsg && kpis">
  <div class="kpi-card accent-blue">
    <div class="kpi-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    </div>
    <div class="kpi-content">
      <span class="kpi-title">Total Alumnos</span>
      <span class="kpi-value">{{ kpis.totalAlumnos }}</span>
    </div>
  </div>
  <div class="kpi-card accent-green">
    <div class="kpi-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--risk-low)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    </div>
    <div class="kpi-content">
      <span class="kpi-title">Asistencia Hoy</span>
      <span class="kpi-value">{{ kpis.asistenciaHoy }}%</span>
    </div>
  </div>
  <div class="kpi-card accent-yellow">
    <div class="kpi-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--risk-medium)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    <div class="kpi-content">
      <span class="kpi-title">Alumnos Riesgo Medio</span>
      <span class="kpi-value">{{ kpis.riesgoMedio }}</span>
    </div>
  </div>
  <div class="kpi-card accent-red">
    <div class="kpi-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--risk-high)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    </div>
    <div class="kpi-content">
      <span class="kpi-title">Alumnos Riesgo Alto</span>
      <span class="kpi-value">{{ kpis.riesgoAlto }}</span>
    </div>
  </div>
</div>
