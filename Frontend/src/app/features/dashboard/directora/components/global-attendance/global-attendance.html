<div class="card chart-card">
  <div class="card-header">
    <h2>Asistencia Global</h2>
    <select class="filter-select">
      <option value="today">Hoy</option>
      <option value="week">Esta Semana</option>
      <option value="month">Este Mes</option>
    </select>
  </div>
  <div class="card-body">
    <!-- Simulación de un gráfico de barras -->
    <div class="chart-container">
      
      <!-- Eje Y Indicadores -->
      <div class="chart-y-axis">
        <span>100</span>
        <span>80</span>
        <span>60</span>
        <span>40</span>
        <span>20</span>
        <span>0</span>
      </div>

      <div class="chart-bar-group">
        <div class="chart-bar primary" style="height: 95%;"></div>
        <div class="chart-label">1ro</div>
      </div>
      <div class="chart-bar-group">
        <div class="chart-bar primary" style="height: 88%;"></div>
        <div class="chart-label">2do</div>
      </div>
      <div class="chart-bar-group">
        <div class="chart-bar primary" style="height: 92%;"></div>
        <div class="chart-label">3ro</div>
      </div>
      <div class="chart-bar-group">
        <div class="chart-bar primary" style="height: 98%;"></div>
        <div class="chart-label">4to</div>
      </div>
      <div class="chart-bar-group">
        <div class="chart-bar primary" style="height: 85%;"></div>
        <div class="chart-label">5to</div>
      </div>
    </div>
  </div>
</div>
