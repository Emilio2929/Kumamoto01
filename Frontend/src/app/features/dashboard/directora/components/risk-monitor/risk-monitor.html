<div class="card risk-card">
  <div class="card-header">
    <h2>Monitor de Riesgo Académico</h2>
  </div>
  <div class="card-body">
    <div class="risk-gauge">
      <div class="gauge-value">17</div>
      <div class="gauge-label">Alumnos con Alerta</div>
    </div>
    
    <div class="risk-legend">
      <div class="legend-item">
        <span class="dot red"></span>
        <span class="label">Riesgo Alto (Inasistencias + Notas)</span>
        <span class="count">5</span>
      </div>
      <div class="legend-item">
        <span class="dot yellow"></span>
        <span class="label">Riesgo Medio (Solo Inasistencias)</span>
        <span class="count">12</span>
      </div>
    </div>
    
    <button class="action-btn">Ver Detalle de Alumnos</button>
  </div>
</div>
