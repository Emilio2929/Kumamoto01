<div class="dashboard-layout">

  <!-- Overlay para móviles -->
  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebarOnMobile()"></div>

  <!-- Sidebar Flotante -->
  <aside class="sidebar" [class.open]="isSidebarOpen" [class.collapsed]="isSidebarCollapsed">
    <div class="logo">
      <img src="/assets/img/insignia_colegio.png" alt="Insignia" class="logo-img">
      <div class="brand-info">
        <span class="name">Kumamoto I</span>
        <span class="portal-type">Portal Directivo</span>
      </div>
    </div>

    <nav class="nav-menu">
      <ul>
        <li>
          <a routerLink="resumen" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Dashboard -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" />
              <rect x="14" y="3" width="7" height="5" />
              <rect x="14" y="12" width="7" height="9" />
              <rect x="3" y="16" width="7" height="5" />
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="estructura" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Estructura/Edificio -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M3 21v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8M3 21h18M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4M12 7V3M10 5h4" />
            </svg>
            <span>Estructura</span>
          </a>
        </li>
        <li>
          <a routerLink="padres" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Padres/Usuarios -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <span>Padres</span>
          </a>
        </li>
        <li>
          <a routerLink="matricula" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Matrícula/Documento -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            <span>Matrícula</span>
          </a>
        </li>
        <li>
          <a routerLink="personal" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Personal -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
              <rect x="11" y="14" width="2" height="7" rx="1" />
            </svg>
            <span>Personal</span>
          </a>
        </li>
        <li>
          <a routerLink="comunicados" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Megaphone/Announcements -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 8a3 3 0 0 0-3-3H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a3 3 0 0 0 3-3V8z" />
              <path d="M10 8v4" />
              <path d="M18 8l4-4v16l-4-4" />
            </svg>
            <span>Comunicados</span>
          </a>
        </li>

      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <!-- SVG: Cerrar Sesión -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-container">

    <!-- Topbar -->
    <header class="topbar">
      <div class="left-actions">
        <!-- Botón menú móvil -->
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="user-profile">
        <div class="icon-action">
          <!-- SVG: Notificaciones -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="badge">3</span>
        </div>

        <a routerLink="perfil" class="icon-action" title="Configuración de Credenciales">
          <!-- SVG: Settings -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </a>

        <div class="avatar">D</div>

        <div class="user-info">
          <span class="name">Ana Directora</span>
          <span class="role">Directora</span>
        </div>
      </div>
    </header>

    <!-- Content Router Area -->
    <main class="content-area custom-scrollbar">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
