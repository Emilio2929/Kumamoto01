<div class="dashboard-layout">

  <!-- Overlay para móviles -->
  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebarOnMobile()"></div>

  <!-- Sidebar Flotante -->
  <aside class="sidebar" [class.open]="isSidebarOpen" [class.collapsed]="isSidebarCollapsed">
    <div class="logo">
      <img src="/assets/img/insignia_colegio.png" alt="Insignia" class="logo-img">
      <div class="brand-info">
        <span class="name">Kumamoto I</span>
        <span class="portal-type">Portal Directivo</span>
      </div>
    </div>

    <nav class="nav-menu">
      <ul>
        <li>
          <a routerLink="resumen" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Dashboard -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" />
              <rect x="14" y="3" width="7" height="5" />
              <rect x="14" y="12" width="7" height="9" />
              <rect x="3" y="16" width="7" height="5" />
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="grados-secciones" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Grados/Lista ordenada -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="10" y1="6" x2="21" y2="6"></line>
              <line x1="10" y1="12" x2="21" y2="12"></line>
              <line x1="10" y1="18" x2="21" y2="18"></line>
              <polyline points="3 6 4 7 6 5"></polyline>
              <polyline points="3 12 4 13 6 11"></polyline>
              <polyline points="3 18 4 19 6 17"></polyline>
            </svg>
            <span>Grados y Secciones</span>
          </a>
        </li>
        <li>
          <a routerLink="aulas" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Aulas/Edificio -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M3 21v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8M3 21h18M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4M12 7V3M10 5h4" />
            </svg>
            <span>Aulas</span>
          </a>
        </li>
        <li>
          <a routerLink="cursos" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Cursos/Libro -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>Cursos</span>
          </a>
        </li>
        <li>
          <a routerLink="competencias" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Checklist/Competencias -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"></polyline>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
            <span>Competencias</span>
          </a>
        </li>
        <li>
          <a routerLink="carga-academica" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Carga Académica/Calendario -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Asignación Docente</span>
          </a>
        </li>
        <li>
          <a routerLink="tutoria" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Tutoría/Persona con estrella -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Tutoría</span>
          </a>
        </li>
        <li>
          <a routerLink="auxiliares" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Auxiliares/Usuarios con plus -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="8.5" cy="7" r="4" />
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            <span>Asig. Auxiliares</span>
          </a>
        </li>
        <li>
          <a routerLink="matricula" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Matrícula/Documento -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            <span>Matrícula</span>
          </a>
        </li>
        <li>
          <a routerLink="usuarios" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Usuarios -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <span>Usuarios</span>
          </a>
        </li>
        <li>
          <a routerLink="comunicados" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Megaphone/Announcements -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 8a3 3 0 0 0-3-3H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a3 3 0 0 0 3-3V8z" />
              <path d="M10 8v4" />
              <path d="M18 8l4-4v16l-4-4" />
            </svg>
            <span>Comunicados</span>
          </a>
        </li>
        <li>
          <a routerLink="desbloqueo-notas" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Lock Open/Unlock -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
            </svg>
            <span>Desbloqueo Notas</span>
          </a>
        </li>
        <li>
          <a routerLink="configuracion-anio" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Calendar Settings -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
              <circle cx="15" cy="16" r="3"></circle>
            </svg>
            <span>Configuración Año</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <!-- SVG: Cerrar Sesión -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-container">

    <!-- Topbar -->
    <header class="topbar">
      <div class="left-actions">
        <!-- Botón menú móvil -->
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="user-profile">
        <div class="icon-action">
          <!-- SVG: Notificaciones -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="badge">3</span>
        </div>

        <a routerLink="perfil" class="icon-action" title="Configuración de Credenciales">
          <!-- SVG: Settings -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </a>

        <div class="avatar">D</div>

        <div class="user-info">
          <span class="name">Ana Directora</span>
          <span class="role">Directora</span>
        </div>
      </div>
    </header>

    <!-- Content Router Area -->
    <main class="content-area custom-scrollbar">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
