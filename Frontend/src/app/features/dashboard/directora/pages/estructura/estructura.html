

<div class="tabs-container">
  <div class="tabs-header">
    <button class="tab-btn" [class.active]="activeTab === 'aulas'" (click)="setTab('aulas')">
      Gestión de Aulas
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'cursos'" (click)="setTab('cursos')">
      Gestión de Cursos
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'grados'" (click)="setTab('grados')">
      Grados y Secciones
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'carga'" (click)="setTab('carga')">
      Carga Académica
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'auxiliares'" (click)="setTab('auxiliares')">
      Asignación Auxiliares
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'tutoria'" (click)="setTab('tutoria')">
      Tutoría
    </button>
  </div>

  <div class="tab-content">
    <app-aulas-manager *ngIf="activeTab === 'aulas'"></app-aulas-manager>
    <app-cursos-manager *ngIf="activeTab === 'cursos'"></app-cursos-manager>
    <app-grados-secciones-manager *ngIf="activeTab === 'grados'"></app-grados-secciones-manager>
    <app-carga-academica-manager *ngIf="activeTab === 'carga'"></app-carga-academica-manager>
    <app-auxiliares-manager *ngIf="activeTab === 'auxiliares'"></app-auxiliares-manager>
    <app-tutoria-manager *ngIf="activeTab === 'tutoria'"></app-tutoria-manager>
  </div>
</div>
