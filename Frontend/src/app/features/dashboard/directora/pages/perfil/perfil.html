

<div class="settings-layout">
  
  <!-- Tarjeta: Datos Generales -->
  <div class="card">
    <div class="card-header">
      <h2>Información de Acceso</h2>
      <span class="icon">Usuario</span>
    </div>
    <div class="card-body">
      <form class="manager-form" (submit)="saveProfile(); $event.preventDefault()">
        <div class="form-group full-width">
          <label>Correo Institucional (Usuario del Sistema)</label>
          <input type="text" [(ngModel)]="userData.username" name="username" disabled title="El correo institucional no se puede cambiar">
          <small class="hint">Su correo institucional es su usuario de acceso y no puede modificarse aquí.</small>
        </div>
        <div class="form-group">
          <label>Correo Personal</label>
          <input type="email" [(ngModel)]="userData.email" name="email" placeholder="ejemplo@gmail.com">
        </div>
        <div class="form-group">
          <label>Teléfono (WhatsApp)</label>
          <input type="text" [(ngModel)]="userData.phone" name="phone">
        </div>
        
        <div class="form-actions mt-4">
          <button type="submit" class="btn secondary">Actualizar Datos</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tarjeta: Cambio de Contraseña -->
  <div class="card">
    <div class="card-header">
      <h2>Seguridad y Contraseña</h2>
      <span class="icon">Seguridad</span>
    </div>
    <div class="card-body">
      <form class="manager-form" (submit)="updatePassword(); $event.preventDefault()">
        <div class="form-group full-width">
          <label>Contraseña Actual</label>
          <input type="password" placeholder="Ingrese su contraseña actual" [(ngModel)]="passwords.current" name="curr">
        </div>
        <div class="form-group full-width">
          <label>Nueva Contraseña</label>
          <input type="password" placeholder="Mínimo 8 caracteres, números y letras" [(ngModel)]="passwords.newPass" name="newp">
        </div>
        <div class="form-group full-width">
          <label>Confirmar Nueva Contraseña</label>
          <input type="password" placeholder="Repita la nueva contraseña" [(ngModel)]="passwords.confirmPass" name="confp">
        </div>
        
        <div class="form-actions mt-4">
          <button type="submit" class="btn primary">Modificar Contraseña</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Custom Confirmation/Info Modal -->
<div class="modal-overlay" *ngIf="modal.show" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()" style="max-width: 400px; width: 90%;">
    <div class="modal-header" [ngClass]="modal.type" style="padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; color: white;" 
         [style.background]="modal.type === 'error' ? 'var(--danger)' : (modal.type === 'success' ? 'var(--success)' : 'var(--primary)')">
      <h3 style="margin: 0; font-size: 1.15rem;">{{ modal.title }}</h3>
      <button class="close-btn" (click)="closeModal()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; line-height: 1;">×</button>
    </div>
    <div class="modal-body" style="padding: 1.5rem; text-align: center; color: var(--text-main); font-size: 1rem; background: var(--bg-surface);">
      <p style="margin: 0; line-height: 1.5;">{{ modal.message }}</p>
    </div>
    <div class="modal-footer" style="padding: 1rem; text-align: center; background: var(--bg-surface); border-top: 1px solid var(--border-color); border-radius: 0 0 12px 12px; display: flex; justify-content: center; gap: 1rem;">
      <button *ngIf="modal.type === 'confirm'" class="btn secondary" (click)="closeModal()" style="min-width: 120px;">
        Cancelar
      </button>
      <button class="btn" [ngClass]="modal.type === 'error' ? 'danger' : 'primary'" (click)="modal.type === 'confirm' ? confirmModal() : closeModal()" style="min-width: 120px;">
        {{ modal.type === 'confirm' ? 'Aceptar' : 'Entendido' }}
      </button>
    </div>
  </div>
</div>
