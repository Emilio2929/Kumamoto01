<div class="card competence-card">
  <div class="card-header">
    <h3>Competencias del Curso</h3>
  </div>
  
  <div class="card-body">
    <!-- Lista de Competencias -->
    <div class="competence-list">
      <div *ngIf="competencias.length === 0" class="empty-list-msg">
        <p>Aún no has registrado ninguna competencia. Registra los criterios que evaluarás.</p>
      </div>

      <div *ngFor="let comp of competencias" class="competence-item">
        <div class="comp-info">
          <span class="comp-code">{{comp.codigo}}</span>
          <span class="comp-name">{{comp.nombre}}</span>
        </div>
        <button (click)="eliminarCompetencia(comp.id)" class="btn-delete" title="Eliminar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </button>
      </div>
    </div>

    <!-- Formulario de Agregación -->
    <div class="competence-form">
      <div class="form-row">
        <div class="form-group col-code">
          <label>Código</label>
          <input type="text" [(ngModel)]="nuevaCompetenciaCodigo" readonly class="form-control" placeholder="C1">
        </div>
        <div class="form-group col-desc">
          <label>Descripción de la Competencia</label>
          <input type="text" [(ngModel)]="nuevaCompetenciaNombre" class="form-control" placeholder="Ej: Construye su identidad" (keyup.enter)="agregarCompetencia()">
        </div>
        <div class="form-group col-btn">
          <label>&nbsp;</label>
          <button (click)="agregarCompetencia()" [disabled]="!nuevaCompetenciaNombre || isSaving" class="btn-add">
            <span *ngIf="isSaving" class="loader"></span>
            <span *ngIf="!isSaving">Agregar</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
