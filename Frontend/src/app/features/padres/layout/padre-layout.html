<div class="dashboard-layout">

  <!-- Overlay para móviles -->
  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebarOnMobile()"></div>

  <!-- Sidebar Flotante -->
  <aside class="sidebar" [class.open]="isSidebarOpen" [class.collapsed]="isSidebarCollapsed">
    <div class="logo">
      <div class="logo-icon">K</div>
      <span>Portal Padres</span>
    </div>

    <nav class="nav-menu">
      <ul>
        <li>
          <a [routerLink]="['/dashboard/padre/dashboard']" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Dashboard -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" />
              <rect x="14" y="3" width="7" height="5" />
              <rect x="14" y="12" width="7" height="9" />
              <rect x="3" y="16" width="7" height="5" />
            </svg>
            <span>Inicio</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/dashboard/padre/notas']" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Notas -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            <span>Calificaciones</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/dashboard/padre/asistencia']" routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <!-- SVG: Asistencia/Reloj -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <span>Asistencia</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <!-- SVG: Cerrar Sesión -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-container">

    <!-- Topbar -->
    <header class="topbar">
      <div class="left-actions">
        <!-- Botón menú móvil -->
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <!-- Selector de Hijos en Topbar -->
        <div class="topbar-hijos-selector" *ngIf="(stateService.hijos$ | async)?.length! > 1">
          <button *ngFor="let h of (stateService.hijos$ | async)"
                  [class.active]="(stateService.hijoSeleccionado$ | async)?.id === h.id"
                  (click)="seleccionarHijo(h)">
            <span class="avatar-sm">🎓</span>
            <span class="name-sm">{{ h.nombre.split(' ')[0] }}</span>
          </button>
        </div>
      </div>

      <div class="user-profile">
        <div class="icon-action">
          <!-- SVG: Notificaciones -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </div>

        <div class="avatar">{{ user?.nombre?.charAt(0) || 'P' }}</div>

        <div class="user-info">
          <span class="name">{{ user?.nombre || 'Padre de Familia' }}</span>
          <span class="role">Padre</span>
        </div>
      </div>
    </header>

    <!-- Content Router Area -->
    <main class="content-area custom-scrollbar">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
